name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DopeCompanion.sln

      - name: Build
        run: dotnet build DopeCompanion.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DopeCompanion.sln --configuration Release --no-build

      - name: CLI smoke test
        run: dotnet run --project src/DopeCompanion.Cli --configuration Release -- --help
